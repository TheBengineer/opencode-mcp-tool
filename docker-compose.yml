services:
  opencode-mcp:
    build: .
    container_name: opencode-mcp
    ports:
      - "3100:3100"
    volumes:
      # Workspace for test app output — files created by OpenCode inside
      # the container appear here on the host.
      - ./workspace:/workspace
    environment:
      # Model the container's OpenCode will use for tasks.
      # Format: "provider/model-id" (e.g. "anthropic/claude-sonnet-4-20250514")
      - OPENCODE_MODEL=${OPENCODE_MODEL:-anthropic/claude-sonnet-4-20250514}

      # API keys — pass through from host env or set in .env file.
      # OpenCode reads these to authenticate with model providers.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
